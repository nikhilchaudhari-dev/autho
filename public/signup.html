<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">AuthSystem</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login">Login</a></li>
                <li><a href="/signup" class="active">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main class="form-page">
        <div class="container">
            <div class="form-container">
                <h2>Create Account</h2>
                <p class="form-subtitle">Join us today and get started</p>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="John Doe"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="john@example.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            minlength="6"
                            required
                        >
                        <small>Password must be at least 6 characters</small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                    
                    <div id="message" class="message"></div>
                </form>

                <p class="form-footer">
                    Already have an account? <a href="/login">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AuthSystem. Built with Node.js + Express + MySQL</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
